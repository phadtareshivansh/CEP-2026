{% extends 'base.html' %}

{% block content %}
<style>
    .auth-container {
        position: relative;
        z-index: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 80vh;
        margin: 0;
        padding: 2rem 1rem;
    }
    
    .auth-card {
        background: white;
        border-radius: 25px;
        padding: 3rem;
        box-shadow: 0 20px 60px rgba(102, 126, 234, 0.2);
        max-width: 450px;
        width: 100%;
        border: 1px solid rgba(102, 126, 234, 0.1);
    }
    
    .auth-card h3 {
        font-size: 2rem;
        font-weight: 900;
        color: #1a202c;
        margin-bottom: 0.5rem;
        text-align: center;
    }
    
    .auth-subtitle {
        text-align: center;
        color: #999;
        font-size: 0.95rem;
        margin-bottom: 2.5rem;
    }
    
    .auth-form-group {
        margin-bottom: 2rem;
    }
    
    .auth-form-group label {
        font-weight: 700;
        font-size: 0.95rem;
        color: #1a202c;
        margin-bottom: 0.8rem;
        display: block;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }
    
    .auth-form-group input {
        width: 100%;
        padding: 1.2rem 1.4rem;
        border: 2px solid #e8ecf8;
        border-radius: 12px;
        font-size: 1rem;
        transition: all 0.3s ease;
        font-weight: 500;
    }
    
    .auth-form-group input:focus {
        border-color: #667eea;
        box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.15);
        outline: none;
        transform: translateY(-2px);
    }
    
    #alertMessage {
        margin-bottom: 1.5rem;
    }
</style>
<div class="auth-container">
    <div class="auth-card">
        <h3>📝 Sign Up</h3>
        <p class="auth-subtitle">Create your Saarthi account</p>
        
        <div id="alertMessage" style="display: none;"></div>
        
        <form id="signupForm">
            {% csrf_token %}
            <div class="auth-form-group">
                <label for="email">✉️ Email</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>
            </div>
            <div class="auth-form-group">
                <label for="username">👤 Username</label>
                <input type="text" id="username" name="username" placeholder="Choose a username" required>
            </div>
            <div class="auth-form-group">
                <label for="password">🔐 Password</label>
                <input type="password" id="password" name="password" placeholder="Create a strong password" required>
            </div>
            <button type="submit" class="btn-primary w-100" style="margin-top: 1.5rem; position: relative; z-index: 1;">🚀 Create Account</button>
        </form>
        
        <hr style="margin: 2.5rem 0; border-color: #e8ecf8;">
        <p style="text-align: center; color: #666;">
            Already have an account? <a href="{% url 'quiz:login' %}" style="color: #667eea; font-weight: 700; text-decoration: none;">Login</a>
        </p>
    </div>
</div>

<script>
document.getElementById('signupForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const alertDiv = document.getElementById('alertMessage');
    const data = {
        username: document.getElementById('username').value,
        email: document.getElementById('email').value,
        password: document.getElementById('password').value
    };
    
    try {
        const res = await fetch('{% url "quiz:signup" %}', {
            method: 'POST',
            headers: {'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}'},
            body: JSON.stringify(data)
        });
        const result = await res.json();
        if (result.success) {
            alertDiv.innerHTML = `<div class="alert alert-success">✅ Account created! Redirecting...</div>`;
            alertDiv.style.display = 'block';
            setTimeout(() => { window.location = '{% url "quiz:dashboard" %}'; }, 1000);
        } else {
            alertDiv.innerHTML = `<div class="alert alert-warning">⚠️ ${result.message || 'Error'}</div>`;
            alertDiv.style.display = 'block';
        }
    } catch (e) {
        alertDiv.innerHTML = `<div class="alert alert-danger">❌ Error: ${e.message}</div>`;
        alertDiv.style.display = 'block';
    }
});
</script>
{% endblock %}
