{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <h1>👤 My Profile</h1>
    
    <div class="row">
        <div class="col-md-4">
            <div class="card">
                <div class="card-body text-center">
                    {% if profile.profile_picture %}
                    <img src="{{ profile.profile_picture.url }}" class="rounded-circle mb-3" width="150">
                    {% else %}
                    <div class="bg-secondary rounded-circle mb-3 mx-auto" style="width: 150px; height: 150px; display: flex; align-items: center; justify-content: center;">
                        <span class="text-white text-5xl">👤</span>
                    </div>
                    {% endif %}
                    <h4>{{ user.get_full_name|default:user.username }}</h4>
                    <p class="text-muted">{{ profile.current_role|default:"No role set" }}</p>
                </div>
            </div>
        </div>
        
        <div class="col-md-8">
            <div class="card">
                <div class="card-header">
                    <h5>Profile Information</h5>
                </div>
                <div class="card-body">
                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label">Bio</label>
                            <textarea class="form-control" name="bio" rows="3">{{ profile.bio }}</textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Location</label>
                            <input type="text" class="form-control" name="location" value="{{ profile.location }}">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Current Role</label>
                            <input type="text" class="form-control" name="current_role" value="{{ profile.current_role }}">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Experience Level</label>
                            <select class="form-select" name="experience_level">
                                <option value="student" {% if profile.experience_level == 'student' %}selected{% endif %}>Student</option>
                                <option value="entry" {% if profile.experience_level == 'entry' %}selected{% endif %}>Entry Level</option>
                                <option value="mid" {% if profile.experience_level == 'mid' %}selected{% endif %}>Mid Level</option>
                                <option value="senior" {% if profile.experience_level == 'senior' %}selected{% endif %}>Senior</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary">Save Profile</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
